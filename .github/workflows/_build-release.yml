      - name: Create TAR.GZ archive
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          tar czf "dist/${ARTIFACT_NAME}.tar.gz" -C "target/${{ matrix.target }}/release" "${{ env.PROJECT_NAME }}"

      - name: Create DMG package
        shell: bash
        run: |
          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh "${{ inputs.version }}" "target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}" "dist"

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}-macos-arm64
          path: dist/*
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs:
      [
        build-windows-x64,
        build-windows-arm64,
        build-linux-x86_64,
        build-linux-arm64,
        build-linux-loongarch64,
        build-macos-x64,
        build-macos-arm64,
        build-docker,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: ${{ env.PROJECT_NAME }}-*
          merge-multiple: false

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          TAG_NAME="v${{ inputs.version }}"

          echo "## Release: $TAG_NAME" > release_notes.md
          echo "" >> release_notes.md
          echo "**Release Type:** ${{ inputs.release_type }}" >> release_notes.md
          echo "" >> release_notes.md

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "$TAG_NAME"^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "## Changes since $PREVIOUS_TAG" >> release_notes.md
            echo "" >> release_notes.md
            git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges >> release_notes.md
          else
            echo "## Initial Release" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" --no-merges | head -50 >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "## Supported Platforms & Architectures" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Platform | Architecture | Package Formats |" >> release_notes.md
          echo "|----------|--------------|-----------------|" >> release_notes.md
          echo "| Windows | x86_64 | ZIP, MSI (WiX) |" >> release_notes.md
          echo "| Windows | ARM64 | ZIP |" >> release_notes.md
