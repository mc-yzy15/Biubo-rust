name: Build and Release (Reusable)

on:
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g., 1.0.0-alpha.1)"
        required: true
        type: string
      release_type:
        description: "Release type: canary, alpha, nightly, beta, stable, lts"
        required: true
        type: string
      make_latest:
        description: "Mark this release as the latest release (true/false)"
        required: false
        type: string
        default: "false"
      retention_days:
        description: "Number of days to retain build artifacts"
        required: false
        type: number
        default: 30

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: biubo-waf
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-x64:
    name: Build Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}/release
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Install WiX Toolset
        run: |
          curl -L -o wix.exe https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311.exe
          .\wix.exe /install /quiet

      - name: Create ZIP archive
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          7z a "dist/${ARTIFACT_NAME}.zip" "target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}.exe"

      - name: Create MSI installer (WiX)
        continue-on-error: true
        shell: bash
        run: |
          echo "=== MSI Build Diagnostics ==="
          echo "Checking WiX installation..."
          ls -la "/c/Program Files (x86)/WiX Toolset v311/bin/" 2>/dev/null || echo "WiX v311 not found at default path"
          cargo install cargo-wix --locked 2>&1 || echo "cargo-wix install failed"
          echo "=== Attempting cargo wix ==="
          cargo wix --target ${{ matrix.target }} --output "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.msi" || {
            echo "WARNING: MSI build failed, ZIP artifact is still available"
            exit 0
          }

      - name: Upload Windows x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}-windows
          path: dist/*
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error

  build-windows-arm64:
    name: Build Windows ARM64
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross-compilation tools
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if ([string]::IsNullOrEmpty($vsPath)) {
            Write-Error "ARM64 build tools not installed. Please install Visual Studio ARM64 tools."
            exit 1
          }

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}/release
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Create ZIP archive
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          7z a "dist/${ARTIFACT_NAME}.zip" "target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}.exe"

      - name: Upload Windows ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}-windows-arm64
          path: dist/*
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error

  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}/release
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Create TAR.GZ archive
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          tar czf "dist/${ARTIFACT_NAME}.tar.gz" -C "target/${{ matrix.target }}/release" "${{ env.PROJECT_NAME }}"

      - name: Build DEB package
        continue-on-error: true
        shell: bash
        run: |
          echo "=== DEB Build Diagnostics ==="
          echo "Target: ${{ matrix.target }}"
          echo "Working dir: $(pwd)"
          ls -la target/${{ matrix.target }}/release/biubo-waf 2>&1 || echo "binary not found"
          ls -la systemd/ 2>&1 || echo "systemd dir not found"
          cat Cargo.toml | grep -A 15 "\[package.metadata.deb\]" || echo "deb metadata not found"
          echo "=== Attempting cargo deb ==="
          cargo deb --target ${{ matrix.target }} --no-build --output "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.deb" || {
            echo "WARNING: DEB build failed, continuing with other artifacts"
            exit 0
          }

      - name: Build RPM package (YUM/DNF)
        continue-on-error: true
        shell: bash
        run: |
          cargo generate-rpm --target ${{ matrix.target }} || {
            echo "WARNING: RPM build failed, continuing"
            exit 0
          }
          find "target/${{ matrix.target }}/generate-rpm/" -name "*.rpm" -exec cp {} "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.rpm" \; 2>/dev/null || true

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}-linux
          path: dist/*
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install packaging tools
        run: |
          sudo apt-get install -y rpm
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}/release
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Create TAR.GZ archive
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          tar czf "dist/${ARTIFACT_NAME}.tar.gz" -C "target/${{ matrix.target }}/release" "${{ env.PROJECT_NAME }}"

      - name: Build DEB package
        continue-on-error: true
        shell: bash
        run: |
          echo "=== DEB Build Diagnostics (ARM64) ==="
          echo "Target: ${{ matrix.target }}"
          ls -la target/${{ matrix.target }}/release/biubo-waf 2>&1 || echo "binary not found"
          ls -la systemd/ 2>&1 || echo "systemd dir not found"
          echo "=== Attempting cargo deb ==="
          cargo deb --target ${{ matrix.target }} --no-build --output "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.deb" || {
            echo "WARNING: DEB build failed (ARM64), continuing"
            exit 0
          }

      - name: Build RPM package (YUM/DNF)
        continue-on-error: true
        shell: bash
        run: |
          cargo generate-rpm --target ${{ matrix.target }} || {
            echo "WARNING: RPM build failed (ARM64), continuing"
            exit 0
          }
          find "target/${{ matrix.target }}/generate-rpm/" -name "*.rpm" -exec cp {} "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.rpm" \; 2>/dev/null || true

      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}-linux-arm64
          path: dist/*
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error

  build-linux-loongarch64:
    name: Build Linux LoongArch64 (龙芯)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: loongarch64-unknown-linux-musl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig as cross-compiler for C dependencies
        run: |
          ZIG_VERSION="0.13.0"
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" \
            | tar xJ -C /opt
          ZIG_DIR="/opt/zig-linux-x86_64-${ZIG_VERSION}"
          printf '#!/bin/bash\nZIG="%s/zig"\nARGS=()\nfor a in "$@"; do\n  case "$a" in\n    --target=*|--param*|-pedantic|-Wno-*|-fstack-protector*|-fno-omit-frame-pointer|-ffunction-sections|-fdata-sections|-fPIC|-fPIE|-fno-plt|-fno-pic|-fno-pie|-Werror|-Wall|-Wextra|-Wconversion|-Wshadow|-Wcast-align|-Wmissing-field-initializers|-Wswitch-enum|-fwrapv|-fvisibility=hidden) ;;\n    *) ARGS+=("$a") ;;\n  esac\ndone\nexec "$ZIG" cc -target loongarch64-linux-musl -static "${ARGS[@]}"\n' "$ZIG_DIR" > /usr/local/bin/loongarch64-cc
          sed 's/cc/c++/g; s/CC/CXX/g' /usr/local/bin/loongarch64-cc > /usr/local/bin/loongarch64-cxx
          printf '#!/bin/bash\nexec %s/zig ar "$@"\n' "$ZIG_DIR" > /usr/local/bin/loongarch64-ar
          chmod +x /usr/local/bin/loongarch64-cc /usr/local/bin/loongarch64-cxx /usr/local/bin/loongarch64-ar
          ${ZIG_DIR}/zig version
          echo "--- Wrapper ---"
          cat /usr/local/bin/loongarch64-cc
          echo "--- Test ---"
          echo 'int main(){return 0;}' | /usr/local/bin/loongarch64-cc -x c - -o /tmp/test-loongarch64 2>&1
          /tmp/test-loongarch64 || echo "test binary exit code: $?"
          echo "RUSTFLAGS=-C link-arg=-static" >> $GITHUB_ENV
          echo "CARGO_TARGET_LOONGARCH64_UNKNOWN_LINUX_MUSL_LINKER=/usr/local/bin/loongarch64-cc" >> $GITHUB_ENV
          echo "CC_loongarch64_unknown_linux_musl=/usr/local/bin/loongarch64-cc" >> $GITHUB_ENV
          echo "CXX_loongarch64_unknown_linux_musl=/usr/local/bin/loongarch64-cxx" >> $GITHUB_ENV
          echo "AR_loongarch64_unknown_linux_musl=/usr/local/bin/loongarch64-ar" >> $GITHUB_ENV

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          cargo install cargo-deb --locked
          cargo install cargo-generate-rpm --locked

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target/${{ matrix.target }}/release
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      - name: Build release binary (LoongArch64 gnu)
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Create TAR.GZ archive
        shell: bash
        run: |
          ARTIFACT_NAME="${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}"
          mkdir -p dist
          tar czf "dist/${ARTIFACT_NAME}.tar.gz" -C "target/${{ matrix.target }}/release" "${{ env.PROJECT_NAME }}"

      - name: Build DEB package (LoongArch64)
        continue-on-error: true
        shell: bash
        run: |
          echo "=== DEB Build Diagnostics (LoongArch64 gnu) ==="
          cargo deb --target ${{ matrix.target }} --no-build --output "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.deb" || {
            echo "WARNING: DEB build failed (LoongArch64), continuing"
            exit 0
          }

      - name: Build RPM package (YUM/DNF, LoongArch64)
        continue-on-error: true
        shell: bash
        run: |
          cargo generate-rpm --target ${{ matrix.target }} || {
            echo "WARNING: RPM build failed (LoongArch64), continuing"
            exit 0
          }
          find "target/${{ matrix.target }}/generate-rpm/" -name "*.rpm" -exec cp {} "dist/${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}.rpm" \; 2>/dev/null || true

      - name: Upload Linux LoongArch64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ inputs.version }}-${{ matrix.target }}-linux-loongarch64
          path: dist/*
          retention-days: ${{ inputs.retention_days }}
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x86_64
    runs-on: macos-latest
    timeout-minutes: 60
