      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          find release-artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ env.PROJECT_NAME }} v${{ inputs.version }}
          body_path: release_notes.md
          draft: ${{ inputs.release_type != 'stable' && inputs.release_type != 'lts' }}
          prerelease: ${{ inputs.release_type != 'stable' && inputs.release_type != 'lts' }}
          make_latest: ${{ inputs.make_latest }}
          files: release-assets/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ inputs.release_type == 'stable' }}
            type=raw,value=weekly,enable=${{ inputs.release_type == 'weekly' }}
            type=raw,value=nightly,enable=${{ inputs.release_type == 'nightly' }}
            type=raw,value=monthly,enable=${{ inputs.release_type == 'monthly' }}
            type=raw,value=canary,enable=${{ inputs.release_type == 'canary' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
