name: Docker Compose Integration Test

on:
  push:
    branches: [master, dev]
    paths:
      - "docker/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-compose-test.yml"
  pull_request:
    branches: [master, dev]
    paths:
      - "docker/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-compose-test.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  docker-compose-test:
    name: Docker Compose Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start services
        run: |
          docker compose -f docker-compose.yml up -d --build

      - name: Wait for WAF health check
        run: |
          echo "Waiting for WAF to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:80/health > /dev/null 2>&1; then
              echo "WAF is healthy!"
              exit 0
            fi
            echo "Attempt $i: WAF not ready yet..."
            sleep 5
          done
          echo "WAF failed to become healthy within timeout"
          docker compose logs biubo-waf
          exit 1

      - name: Run basic WAF tests
        run: |
          echo "Testing /health endpoint..."
          HEALTH_RESPONSE=$(curl -sf http://localhost:80/health)
          echo "Health response: $HEALTH_RESPONSE"
          echo "$HEALTH_RESPONSE" | grep -q '"status":"ok"' && echo "Health check passed!" || exit 1

          echo "Testing /info/biubo/system endpoint..."
          SYSTEM_RESPONSE=$(curl -sf http://localhost:80/info/biubo/system)
          echo "System response: $SYSTEM_RESPONSE"
          echo "$SYSTEM_RESPONSE" | grep -q '"status":"success"' && echo "System info check passed!" || exit 1

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml down -v
