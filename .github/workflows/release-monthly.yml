name: Release - Monthly Stable

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compute-version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/' | sed 's/-.*//')
          SUFFIX="stable.$(date -u +'%Y%m')"
          VERSION="${BASE_VERSION}-${SUFFIX}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          SINCE_DATE=$(date -u -d '1 month ago' '+%Y-%m-%dT00:00:00Z' 2>/dev/null || date -u -v-1m '+%Y-%m-%dT00:00:00Z')
          CHANGELOG=$(git log --since="${SINCE_DATE}" --oneline --no-merges --pretty=format:"- %s (%h)")
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changes found for this month."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Create Monthly Stable Release
    needs: [compute-version, generate-changelog]
    uses: ./.github/workflows/_build-release.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      release_type: stable
      make_latest: true
      retention_days: 0
