name: Release - Weekly Beta

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  compute-version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute date
        id: date
        shell: bash
        run: |
          DATE=$(date -u '+%Y%m%d')
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Compute version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep '^version = ' Cargo.toml | head -n 1 | sed 's/version = "\(.*\)"/\1/' | sed 's/-.*//')
          WEEKLY_VERSION="${BASE_VERSION}-beta.${{ steps.date.outputs.date }}"
          echo "version=${WEEKLY_VERSION}" >> $GITHUB_OUTPUT

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          SINCE_DATE=$(date -u -d '7 days ago' '+%Y-%m-%dT00:00:00Z')
          CHANGELOG=$(git log --since="${SINCE_DATE}" --pretty=format:"- %s (%h)" --no-merges)
          if [ -z "${CHANGELOG}" ]; then
            CHANGELOG="No changes in the past 7 days."
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${CHANGELOG}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    name: Create Weekly Beta Release
    needs: [compute-version, generate-changelog]
    uses: ./.github/workflows/_build-release.yml
    with:
      version: ${{ needs.compute-version.outputs.version }}
      release_type: weekly
      make_latest: false
      retention_days: 90
