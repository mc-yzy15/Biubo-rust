services:
  waf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biubo-waf
    restart: unless-stopped
    ports:
      - "${WAF_PORT:-80}:80"
      - "${SSL_PORT:-443}:443"
    environment:
      - WAF_PORT=${WAF_PORT:-80}
      - RUST_LOG=${RUST_LOG:-info}
      - WAF_DASHBOARD_PASSWORD=${WAF_DASHBOARD_PASSWORD:-}
      - WAF_CORS_ORIGINS=${WAF_CORS_ORIGINS:-[]}
      - WAF_API_KEY=${WAF_API_KEY:-}
      - WAF_LLM_MODEL=${WAF_LLM_MODEL:-qwen-plus}
      - WAF_LLM_BASE_URL=${WAF_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-msgpack}
      - STORAGE_REDIS_URL=${STORAGE_REDIS_URL:-redis://redis:6379}
      - STORAGE_POSTGRES_URL=${STORAGE_POSTGRES_URL:-}
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - SSL_DOMAINS=${SSL_DOMAINS:-}
      - SSL_ACME_EMAIL=${SSL_ACME_EMAIL:-}
      - SSL_CERT_DIR=${SSL_CERT_DIR:-/app/ssl}
      - SSL_PORT=${SSL_PORT:-443}
    volumes:
      - waf-data:/app/data
      - waf-ssl:/app/ssl
      - waf-config:/app/config
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - biubo-network

  redis:
    image: redis:7-alpine
    container_name: biubo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - biubo-network

  postgres:
    image: postgres:16-alpine
    container_name: biubo-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-biubo_waf}
      - POSTGRES_USER=${POSTGRES_USER:-biubo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-biubo_secure_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biubo}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - biubo-network

volumes:
  waf-data:
    driver: local
  waf-ssl:
    driver: local
  waf-config:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  biubo-network:
    driver: bridge